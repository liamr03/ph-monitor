<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pH Monitor</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050d1a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050d1a;
            --card-bg: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --accent: #00e5ff;
            --glow: #00e5ff;
            --text: #e0f7fa;
            --muted: rgba(224,247,250,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: drift 12s ease-in-out infinite alternate;
            pointer-events: none;
        }
        .bg-blob-1 {
            width: 500px; height: 500px;
            background: #0077b6;
            top: -100px; left: -100px;
            animation-duration: 14s;
        }
        .bg-blob-2 {
            width: 400px; height: 400px;
            background: #00b4d8;
            bottom: -80px; right: -80px;
            animation-duration: 10s;
        }
        .bg-blob-3 {
            width: 300px; height: 300px;
            background: var(--accent);
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.07;
            animation-duration: 16s;
        }
        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.08); }
        }

        /* Ripple rings */
        .ripple-container {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid var(--glow);
            opacity: 0;
            animation: ripple 3s ease-out infinite;
        }
        .ring:nth-child(1) { width: 140px; height: 140px; animation-delay: 0s; }
        .ring:nth-child(2) { width: 180px; height: 180px; animation-delay: 0.8s; }
        .ring:nth-child(3) { width: 220px; height: 220px; animation-delay: 1.6s; }
        @keyframes ripple {
            0%   { opacity: 0.5; transform: scale(0.6); }
            100% { opacity: 0;   transform: scale(1.1); }
        }

        .ph-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.08);
            border: 1.5px solid rgba(0, 229, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            box-shadow: 0 0 40px rgba(0,229,255,0.15), inset 0 0 30px rgba(0,229,255,0.05);
            transition: box-shadow 0.6s ease, border-color 0.6s ease, background 0.6s ease;
        }

        .ph-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.8rem;
            letter-spacing: 0.02em;
            line-height: 1;
            color: var(--accent);
            text-shadow: 0 0 20px var(--glow), 0 0 60px rgba(0,229,255,0.3);
            transition: color 0.6s ease, text-shadow 0.6s ease;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            animation: fadeUp 0.7s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.8rem;
            font-weight: 500;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #00e676;
            box-shadow: 0 0 8px #00e676;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }
        .status-text {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 300;
        }

        .ph-label-text {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.2rem;
        }

        /* pH quality badge */
        .quality-badge {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: rgba(0,229,255,0.1);
            border: 1px solid rgba(0,229,255,0.2);
            color: var(--accent);
            transition: all 0.6s ease;
        }

        /* pH scale */
        .scale-container {
            margin-top: 2rem;
        }
        .scale-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--muted);
            margin-bottom: 0.4rem;
            letter-spacing: 0.05em;
        }
        .scale-bar {
            position: relative;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right,
            #e53935 0%,
            #fb8c00 14%,
            #fdd835 28%,
            #00e676 50%,
            #00acc1 71%,
            #5e35b1 100%
            );
            overflow: visible;
        }
        .scale-marker {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            border: 2px solid var(--bg);
            box-shadow: 0 0 0 2px var(--accent), 0 0 12px var(--glow);
            transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 1.8rem 0;
        }

        .refresh-btn {
            width: 100%;
            padding: 0.85rem;
            background: rgba(0,229,255,0.08);
            border: 1px solid rgba(0,229,255,0.2);
            border-radius: 1rem;
            color: var(--accent);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
        }
        .refresh-btn:hover {
            background: rgba(0,229,255,0.15);
            box-shadow: 0 0 20px rgba(0,229,255,0.15);
        }
        .refresh-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>

<div class="card">
    <div class="label">Pool pH Monitor</div>

    <div class="ripple-container">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ph-circle" id="ph-circle">
            <div class="ph-number" id="ph-value">--</div>
        </div>
    </div>

    <div class="ph-label-text">pH Level</div>
    <div class="quality-badge" id="quality-badge">Waiting...</div>

    <div class="scale-container">
        <div class="scale-labels">
            <span>0 Acid</span>
            <span>7 Neutral</span>
            <span>14 Base</span>
        </div>
        <div class="scale-bar">
            <div class="scale-marker" id="scale-marker" style="left: 50%"></div>
        </div>
    </div>

    <div class="divider"></div>

    <div class="status-row">
        <div class="status-dot" id="status-dot"></div>
        <div class="status-text" id="updated-time">Connecting...</div>
    </div>

    <div style="height: 1rem"></div>

    <button class="refresh-btn" onclick="fetchPh()">↻ &nbsp;Refresh</button>
</div>

<script>
    // Color + label based on pH value
    function getPhMeta(ph) {
        if (ph < 4)  return { color: '#ef5350', glow: '#ef5350', label: 'Strongly Acidic', quality: 'danger' };
        if (ph < 6)  return { color: '#ff7043', glow: '#ff7043', label: 'Acidic',          quality: 'warning' };
        if (ph < 6.8)return { color: '#ffd54f', glow: '#ffd54f', label: 'Slightly Acidic', quality: 'caution' };
        if (ph <= 7.6)return { color: '#00e676', glow: '#00e676', label: 'Optimal',         quality: 'good' };
        if (ph <= 8.5)return { color: '#26c6da', glow: '#26c6da', label: 'Slightly Basic',  quality: 'caution' };
        if (ph <= 10) return { color: '#7986cb', glow: '#7986cb', label: 'Basic',            quality: 'warning' };
        return             { color: '#ab47bc', glow: '#ab47bc', label: 'Strongly Basic',   quality: 'danger' };
    }

    function applyPhStyle(ph) {
        const meta = getPhMeta(ph);
        const circle  = document.getElementById('ph-circle');
        const number  = document.getElementById('ph-value');
        const badge   = document.getElementById('quality-badge');
        const marker  = document.getElementById('scale-marker');
        const rings   = document.querySelectorAll('.ring');

        // Update colors
        number.style.color      = meta.color;
        number.style.textShadow = `0 0 20px ${meta.glow}, 0 0 60px ${meta.glow}44`;
        circle.style.borderColor = meta.color + '55';
        circle.style.background  = meta.color + '10';
        circle.style.boxShadow   = `0 0 40px ${meta.glow}25, inset 0 0 30px ${meta.glow}0a`;
        badge.style.color        = meta.color;
        badge.style.borderColor  = meta.color + '44';
        badge.style.background   = meta.color + '18';
        badge.textContent        = meta.label;
        rings.forEach(r => r.style.borderColor = meta.color);

        // Move scale marker: pH 0-14 → 0%-100%
        marker.style.left = ((ph / 14) * 100).toFixed(1) + '%';
        marker.style.boxShadow = `0 0 0 2px ${meta.color}, 0 0 12px ${meta.glow}`;
    }

    async function fetchPh() {
        const dot = document.getElementById('status-dot');
        dot.style.background = '#ffd54f';
        dot.style.boxShadow  = '0 0 8px #ffd54f';

        try {
            const res  = await fetch('/ph');
            const data = await res.json();
            const ph   = parseFloat(data.value);

            document.getElementById('ph-value').textContent = ph.toFixed(2);
            document.getElementById('updated-time').textContent =
                'Updated ' + new Date().toLocaleTimeString();

            applyPhStyle(ph);

            dot.style.background = '#00e676';
            dot.style.boxShadow  = '0 0 8px #00e676';
        } catch (err) {
            console.error(err);
            document.getElementById('ph-value').textContent = 'Err';
            document.getElementById('updated-time').textContent = 'Connection failed';
            dot.style.background = '#ef5350';
            dot.style.boxShadow  = '0 0 8px #ef5350';
        }
    }

    fetchPh();
    setInterval(fetchPh, 5000); // auto-refresh every 5s
</script>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')
            .then(() => console.log("SW Registered"))
            .catch(err => console.error("SW Failed", err));
    }
</script>
</body>
</html>
